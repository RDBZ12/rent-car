<!DOCTYPE html>
<html>
<head>
    <title>TEST BÁSICO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5 bg-light">
    <div class="container">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h3>✅ TEST BÁSICO - Sin PHP</h3>
            </div>
            <div class="card-body">
                <p id="status"></p>
                <button class="btn btn-danger" onclick="test()">HACER TEST</button>
                <div id="resultado" style="margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 5px; font-family: monospace; white-space: pre-wrap; max-height: 400px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script>
        const baseUrl = "http://localhost/alquiler/";
        
        function test() {
            let output = "=== TEST BÁSICO ===\n\n";
            output += "1. Base URL: " + baseUrl + "\n";
            output += "2. Test de fetch...\n\n";
            
            document.getElementById('resultado').textContent = output;

            const formData = new FormData();
            formData.append('modelo', '1');
            formData.append('anio', '2005');

            fetch(baseUrl + 'Vehiculos/obtenerImagenApi', {
                method: 'POST',
                body: formData
            })
            .then(res => res.text())
            .then(text => {
                output += "Status: 200\n";
                output += "Response: " + text + "\n";
                document.getElementById('resultado').textContent = output;
            })
            .catch(err => {
                output += "ERROR: " + err.message + "\n";
                document.getElementById('resultado').textContent = output;
            });
        }
    </script>
</body>
</html>
